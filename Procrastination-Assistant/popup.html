<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Procrastination Assistant</title>

<style>

body{
width:280px;
font-family:Segoe UI, Arial;
text-align:center;
background:linear-gradient(135deg,#1e1e2f,#2d2d44);
color:white;
padding:15px;
}

h3{
margin-bottom:10px;
}

.card{
background:#ffffff10;
padding:12px;
border-radius:12px;
margin-bottom:10px;
}

button{
width:100%;
padding:10px;
margin-top:5px;
border:none;
border-radius:8px;
background:#4CAF50;
color:white;
font-size:14px;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#45a049;
transform:scale(1.03);
}

#timerBtn{
background:#ff9800;
}

#timerBtn:hover{
background:#fb8c00;
}

#distractionBtn{
background:#e91e63;
}

#distractionBtn:hover{
background:#d81b60;
}

p{
margin-top:6px;
font-size:13px;
color:#ddd;
}

</style>

</head>

<body>

<h3>😈 Procrastination Assistant</h3>

<div class="card">
<button id="excuseBtn">Generate Excuse</button>
<p id="excuse"></p>
</div>

<div class="card">
<button id="timerBtn">Fake Study Timer</button>
<p id="timer"></p>
</div>

<div class="card">
<button id="distractionBtn">Find Distraction</button>
<p id="distraction"></p>
</div>

<script src="popup.js"></script>

</body>
</html>
